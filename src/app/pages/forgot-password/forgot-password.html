<div class="forgot-page">
  <div class="forgot-card ml-card">
    <h1 class="page-header">Quên mật khẩu</h1>
    <p class="forgot-subtitle">Nhập email đăng ký, chúng tôi sẽ gửi link đặt lại mật khẩu.</p>

    @if (success()) {
      <div class="success-box">
        <p>Đã gửi email. Kiểm tra hộp thư (và thư mục spam) để đặt lại mật khẩu.</p>
        <a mat-flat-button color="primary" routerLink="/login">Về đăng nhập</a>
      </div>
    } @else {
      <form (ngSubmit)="onSubmit()" class="forgot-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input
            matInput
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            required
          />
        </mat-form-field>

        @if (error()) {
          <p class="error-msg">{{ error() }}</p>
        }

        <button
          mat-flat-button
          color="primary"
          type="submit"
          class="submit-btn"
          [disabled]="loading()"
        >
          @if (loading()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Gửi link đặt lại mật khẩu
          }
        </button>
      </form>
    }

    <p class="back-link">
      <a routerLink="/login">← Quay lại đăng nhập</a>
    </p>
  </div>
</div>
